<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E6"/>
      <stop offset="100%" stop-color="#ECE4D4"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A2F"/>
      <stop offset="100%" stop-color="#0F2A20"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A24B"/>
      <stop offset="100%" stop-color="#A8842F"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- marble veining, subtle -->
  <g stroke="#1B3A2F" stroke-opacity="0.05" fill="none" stroke-width="2">
    <path d="M-20 120 C 180 90, 320 200, 540 150 S 980 60, 1240 160"/>
    <path d="M-20 470 C 220 520, 460 410, 700 470 S 1020 540, 1240 480"/>
    <path d="M0 300 C 200 280, 380 340, 600 300 S 1000 250, 1200 310"/>
  </g>

  <!-- top brass rule -->
  <rect x="80" y="78" width="120" height="4" fill="url(#brass)"/>

  <!-- eyebrow -->
  <text x="80" y="128" font-family="'Courier New', monospace" font-size="22" letter-spacing="6" fill="#A8842F">LIVING STATUTE DOSSIER</text>

  <!-- wordmark + headline -->
  <text x="78" y="232" font-size="92" font-weight="600" fill="#16261F" letter-spacing="-1">Statutory</text>
  <text x="80" y="320" font-size="46" fill="#2C463B">The exact rules that govern</text>
  <text x="80" y="376" font-size="46" fill="#2C463B">your practice — kept <tspan font-style="italic" fill="#1B3A2F">current.</tspan></text>

  <!-- supporting line -->
  <text x="80" y="452" font-family="Arial, sans-serif" font-size="25" fill="#5B5141">Deltas pushed when a statute you rely on changes — with the</text>
  <text x="80" y="486" font-family="Arial, sans-serif" font-size="25" fill="#5B5141">exact citation, effective date, and a ready client-alert draft.</text>

  <!-- right: statehouse / bill-stage emblem -->
  <g transform="translate(880,150)">
    <rect x="-40" y="-40" width="320" height="360" rx="18" fill="url(#green)"/>
    <!-- columns -->
    <g fill="#F5F0E6" fill-opacity="0.92">
      <path d="M120 0 L40 40 L200 40 Z"/>
      <rect x="48" y="44" width="144" height="8"/>
      <rect x="58" y="58" width="14" height="120"/>
      <rect x="92" y="58" width="14" height="120"/>
      <rect x="134" y="58" width="14" height="120"/>
      <rect x="168" y="58" width="14" height="120"/>
      <rect x="44" y="184" width="152" height="10"/>
    </g>
    <!-- bill lifecycle dots -->
    <g transform="translate(36,230)">
      <circle cx="0" cy="0" r="9" fill="#C9A24B"/>
      <circle cx="58" cy="0" r="9" fill="#C9A24B"/>
      <circle cx="116" cy="0" r="9" fill="#C9A24B"/>
      <circle cx="174" cy="0" r="11" fill="#F5F0E6"/>
      <line x1="9" y1="0" x2="49" y2="0" stroke="#C9A24B" stroke-width="3"/>
      <line x1="67" y1="0" x2="107" y2="0" stroke="#C9A24B" stroke-width="3"/>
      <line x1="125" y1="0" x2="163" y2="0" stroke="#C9A24B" stroke-width="3"/>
    </g>
    <text x="32" y="282" font-family="'Courier New', monospace" font-size="15" letter-spacing="2" fill="#CFE0D6">INTRODUCED → ENACTED → IN FORCE</text>
  </g>

  <!-- bottom monospace citation chip -->
  <g transform="translate(80,540)">
    <rect x="0" y="0" width="560" height="42" rx="8" fill="#1B3A2F"/>
    <text x="18" y="28" font-family="'Courier New', monospace" font-size="19" fill="#E9DFC8">29 C.F.R. § 541.600 · eff. 2026-07-01 · affects 3 sections</text>
  </g>
</svg>
