services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: statutory-postgres
    environment:
      POSTGRES_USER: statutory
      POSTGRES_PASSWORD: statutory
      POSTGRES_DB: statutory_dev
    ports:
      # Host port 5434 to avoid collisions with other local Postgres instances.
      - '5434:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U statutory']
      interval: 10s
      timeout: 5s
      retries: 5
